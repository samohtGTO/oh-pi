codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "0...100"
  status:
    project:
      default:
        target: 60%
        threshold: 0%
        informational: false
    patch:
      default:
        target: 100%
        threshold: 0%
        informational: false

comment:
  behavior: default
  layout: "reach,diff,flags,tree"
  require_changes: false
  require_base: false
  require_head: false

ignore:
  - "**/*.d.ts"
  - "**/*.test.*"
  - "**/tests/**"
  - "**/dist/**"
  - "**/node_modules/**"
  - "**/vitest*.config.*"
  - "packages/cursor/proto/**"
  - "packages/providers/supported-providers.generated.ts"
