[github]
owner = "ifiokjr"
repo = "oh-pi"

# All packages share the same version (lockstep releases).
# Knope bumps all versioned_files together.
# Changeset frontmatter must therefore use `default`, not package names.
[package]
versioned_files = [
	"packages/adaptive-routing/package.json",
	"packages/agents/package.json",
	"packages/analytics-dashboard/package.json",
	"packages/analytics-db/package.json",
	"packages/analytics-extension/package.json",
	"packages/ant-colony/package.json",
	"packages/background-tasks/package.json",
	"packages/cli/package.json",
	"packages/core/package.json",
	"packages/cursor/package.json",
	"packages/diagnostics/package.json",
	"packages/docs/package.json",
	"packages/extensions/package.json",
	"packages/oh-pi/package.json",
	"packages/ollama/package.json",
	"packages/pi-bash-live-view/package.json",
	"packages/pi-pretty/package.json",
	"packages/pi-remote-tailscale/package.json",
	"packages/plan/package.json",
	"packages/prompts/package.json",
	"packages/providers/package.json",
	"packages/shared-qna/package.json",
	"packages/skills/package.json",
	"packages/spec/package.json",
	"packages/subagents/package.json",
	"packages/themes/package.json",
	"packages/web-client/package.json",
	"packages/web-remote/package.json",
	"packages/web-server/package.json",
]
changelog = "CHANGELOG.md"

[[workflows]]
name = "release"
help_text = "Bump versions, update CHANGELOG.md, create git tag, and push"

[[workflows.steps]]
type = "Command"
command = "pnpm security:check"

[[workflows.steps]]
type = "PrepareRelease"

[[workflows.steps]]
type = "Command"
command = "git add ."

[[workflows.steps]]
type = "Command"
command = "git commit -m 'chore: release $version'"

[[workflows.steps]]
type = "Command"
command = "git push"

[[workflows.steps]]
type = "Release"

[[workflows]]
name = "publish"
help_text = "Build and publish all public packages to npm"

[[workflows.steps]]
type = "Command"
command = "pnpm build"

[[workflows.steps]]
type = "Command"
command = "pnpm -r publish --access public --no-git-checks"

[[workflows]]
name = "document-change"
help_text = "Create a new changeset file for the next release"

[[workflows.steps]]
type = "CreateChangeFile"

[[workflows.steps]]
type = "Command"
command = "pnpm format"

[[workflows]]
name = "get-version"
help_text = "Print the current version"

[[workflows.steps]]
type = "Command"
command = "echo $version"
